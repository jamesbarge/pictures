name: Post-Deploy Verification

on:
  deployment_status:

jobs:
  verify:
    if: github.event.deployment_status.state == 'success' && github.event.deployment_status.environment == 'Production'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Smoke-test production homepage
        env:
          DEPLOY_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          # Prefer the freshly-deployed URL; fall back to the apex domain.
          TARGET="${DEPLOY_URL:-https://pictures.london}"
          echo "Verifying $TARGET ..."
          curl --fail --show-error --silent --location \
            --retry 3 --retry-delay 5 --max-time 30 \
            -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            "$TARGET"
