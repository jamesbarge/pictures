name: Playwright Scrapers

on:
  # schedule:
  #   # Disabled — moved to local Bree+PM2 scheduler (2026-03-04)
  #   - cron: '0 22 * * 0'
  workflow_dispatch:
    # Allow manual triggers from GitHub Actions UI
    inputs:
      scraper:
        description: 'Specific scraper to run (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - 'curzon'
          - 'picturehouse'
          - 'everyman'
          - 'bfi'
          - 'barbican'
          - 'phoenix'
          - 'electric'
          - 'lexi'
          - 'regent-street'

env:
  NODE_VERSION: '24'

jobs:
  scrape-chains:
    name: Scrape Chain Cinemas
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event.inputs.scraper == '' || github.event.inputs.scraper == 'curzon' || github.event.inputs.scraper == 'picturehouse' || github.event.inputs.scraper == 'everyman'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Scrape Curzon
        id: scrape_curzon
        if: github.event.inputs.scraper == '' || github.event.inputs.scraper == 'curzon'
        timeout-minutes: 40
        continue-on-error: true
        run: npm run scrape:curzon
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Scrape Picturehouse
        id: scrape_picturehouse
        if: github.event.inputs.scraper == '' || github.event.inputs.scraper == 'picturehouse'
        timeout-minutes: 40
        continue-on-error: true
        run: npm run scrape:picturehouse
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Scrape Everyman
        id: scrape_everyman
        if: github.event.inputs.scraper == '' || github.event.inputs.scraper == 'everyman'
        timeout-minutes: 20
        continue-on-error: true
        run: npm run scrape:everyman
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Evaluate chain scraper outcomes
        if: always()
        run: |
          echo "Curzon: ${{ steps.scrape_curzon.outcome }}"
          echo "Picturehouse: ${{ steps.scrape_picturehouse.outcome }}"
          echo "Everyman: ${{ steps.scrape_everyman.outcome }}"
          if [[ "${{ steps.scrape_curzon.outcome }}" == "failure" || "${{ steps.scrape_picturehouse.outcome }}" == "failure" || "${{ steps.scrape_everyman.outcome }}" == "failure" ]]; then
            echo "One or more chain scrapers failed."
            exit 1
          fi

  scrape-independents:
    name: Scrape Playwright Independents
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event.inputs.scraper == '' || github.event.inputs.scraper == 'bfi' || github.event.inputs.scraper == 'barbican' || github.event.inputs.scraper == 'phoenix' || github.event.inputs.scraper == 'electric' || github.event.inputs.scraper == 'lexi' || github.event.inputs.scraper == 'regent-street'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Scrape BFI (backup to PDF import)
        id: scrape_bfi
        if: github.event.inputs.scraper == '' || github.event.inputs.scraper == 'bfi'
        run: npm run scrape:bfi
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Scrape Barbican
        id: scrape_barbican
        if: github.event.inputs.scraper == '' || github.event.inputs.scraper == 'barbican'
        continue-on-error: true
        run: npm run scrape:barbican
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Scrape Phoenix
        id: scrape_phoenix
        if: github.event.inputs.scraper == '' || github.event.inputs.scraper == 'phoenix'
        continue-on-error: true
        run: npm run scrape:phoenix
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Scrape Electric
        id: scrape_electric
        if: github.event.inputs.scraper == '' || github.event.inputs.scraper == 'electric'
        continue-on-error: true
        run: npm run scrape:electric
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Scrape Lexi
        id: scrape_lexi
        if: github.event.inputs.scraper == '' || github.event.inputs.scraper == 'lexi'
        continue-on-error: true
        run: npm run scrape:lexi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Scrape Regent Street
        id: scrape_regent_street
        if: github.event.inputs.scraper == '' || github.event.inputs.scraper == 'regent-street'
        continue-on-error: true
        run: npm run scrape:regent-street
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Evaluate independent scraper outcomes
        if: always()
        run: |
          echo "BFI: ${{ steps.scrape_bfi.outcome }}"
          echo "Barbican: ${{ steps.scrape_barbican.outcome }}"
          echo "Phoenix: ${{ steps.scrape_phoenix.outcome }}"
          echo "Electric: ${{ steps.scrape_electric.outcome }}"
          echo "Lexi: ${{ steps.scrape_lexi.outcome }}"
          echo "Regent Street: ${{ steps.scrape_regent_street.outcome }}"
          if [[ "${{ steps.scrape_bfi.outcome }}" == "failure" || "${{ steps.scrape_barbican.outcome }}" == "failure" || "${{ steps.scrape_phoenix.outcome }}" == "failure" || "${{ steps.scrape_electric.outcome }}" == "failure" || "${{ steps.scrape_lexi.outcome }}" == "failure" || "${{ steps.scrape_regent_street.outcome }}" == "failure" ]]; then
            echo "One or more independent scrapers failed."
            exit 1
          fi

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [scrape-chains, scrape-independents]
    if: failure()

    steps:
      - name: Notify Slack on failure
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Playwright scrapers workflow failed! Check GitHub Actions: $RUN_URL\"}" \
            "$SLACK_WEBHOOK_URL"
